<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>อนุมัติสาขา | ชาพระนคร</title><link rel="stylesheet" href="style.css"><style>.review{max-width:680px;margin:auto;padding:20px}.review h1{margin:0 0 4px}.review p{color:#6b7280}.review-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin:16px 0}.review-card dl{margin:0}.review-card dt{font-size:13px;color:#6b7280;margin-top:12px}.review-card dd{margin:2px 0;font-weight:600;white-space:pre-wrap}.review textarea{width:100%;margin-top:8px;padding:10px;border:1px solid #d1d5db;border-radius:8px;font:inherit}.review button{width:100%;padding:13px;border:0;border-radius:9px;font:700 16px Sarabun,sans-serif;margin-top:10px}.approve{background:#008a45;color:#fff}.reject{background:#c8102e;color:#fff}.notice{padding:12px;border-radius:9px;background:#fff1f2;color:#9f1239}.hidden{display:none}</style></head><body><main class="review"><h1>ตรวจสอบคำขอสาขา</h1><p id="sub">กำลังโหลดข้อมูล…</p><div id="notice" class="notice hidden"></div><section id="card" class="review-card hidden"><dl><dt>เลขที่คำขอ</dt><dd id="id"></dd><dt>สาขา</dt><dd id="branch"></dd><dt>ผู้สมัคร / โทร</dt><dd id="owner"></dd><dt>ที่อยู่</dt><dd id="address"></dd><dt>วันที่ส่ง</dt><dd id="submitted"></dd></dl><label>เหตุผลกรณีปฏิเสธ (จำเป็นเมื่อปฏิเสธ)<textarea id="reason" rows="3"></textarea></label><button id="approve" class="approve">อนุมัติสาขา</button><button id="reject" class="reject">ปฏิเสธคำขอ</button></section></main><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="branch-approval.js?v=2"></script></body></html>
