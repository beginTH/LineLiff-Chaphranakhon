<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Menu Generator - ชาพระนคร</title>
    <!-- ใช้ฟอนต์ Sarabun เพื่อความสวยงาม และรองรับภาษาไทยได้ดี -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- html2canvas สำหรับแปลง HTML เป็นรูปภาพ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        
        body.export-mode { padding: 0; background: #FFFFFF; }
        body.export-mode .header-panel { display: none; }

        .header-panel {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-download {
            background-color: #C8102E;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Sarabun', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(200, 16, 46, 0.3);
            transition: all 0.3s;
        }
        .btn-download:hover {
            background-color: #980000;
            transform: translateY(-2px);
        }

        /* 
           ขนาดมาตรฐาน Rich Menu: 1200x810 
           Design อ้างอิงจาก Design.md (Primary: #C8102E, Secondary: #D1B38B, Text: #1F1F1F)
        */
        .rich-menu-container {
            width: 1250px;
            height: 843px;
            background-color: #FFFFFF;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* เส้นกรอบแบ่งตารางสีทอง */
        .rich-menu-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #D1B38B;
            pointer-events: none;
            z-index: 10;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        /* 1. สั่งซื้อวัตถุดิบ (ปุ่มเด่นที่สุด ใช้สีแดง Primary) */
        .btn-primary-action {
            background: linear-gradient(135deg, #C8102E 0%, #980000 100%);
            color: #FFFFFF;
            border-right: 2px solid #D1B38B;
            border-bottom: 2px solid #D1B38B;
        }
        .btn-primary-action .menu-title { color: #FFFFFF; }
        .btn-primary-action .menu-desc { color: #FECACA; }
        .btn-primary-action svg { fill: #FFFFFF; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }

        /* 2, 3, 4. ปุ่มอื่นๆ พื้นขาว */
        .btn-secondary {
            background-color: #FFFFFF;
        }
        .btn-secondary .menu-title { color: #1F1F1F; }
        .btn-secondary .menu-desc { color: #6B7280; }
        .btn-secondary svg { fill: #C8102E; }

        /* Borders for secondary buttons */
        .btn-top-right { border-bottom: 2px solid #D1B38B; }
        .btn-bottom-left { border-right: 2px solid #D1B38B; }

        /* Typography */
        .menu-title {
            font-size: 52px;
            font-weight: 800;
            margin: 24px 0 8px 0;
            letter-spacing: -0.5px;
        }
        .menu-desc {
            font-size: 26px;
            font-weight: 400;
            margin: 0;
        }

        /* ปุ่มข้อความยาว: ส่งหลักฐานการโอนเงิน */
        .btn-bottom-right .menu-title { font-size: 42px; line-height: 1.15; margin-top: 20px; }
        .btn-bottom-right .menu-desc { font-size: 23px; }

        /* Center Badge Decoration */
        .center-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: #FFFFFF;
            border: 6px solid #D1B38B;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 65px;
            z-index: 5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* Icons Container */
        .icon-wrapper {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>✨ โปรแกรมสร้าง Rich Menu ชาพระนคร (1200x810)</h1>
        <p>ดีไซน์อ้างอิงจากระบบชาพระนคร (โทน ขาว-แดง-ทอง)</p>
        <button class="btn-download" onclick="downloadRichMenu()">📥 บันทึกรูปภาพ (Save as PNG)</button>
    </div>

    <!-- แผง Rich Menu (ขนาด 1200x810 จริง) -->
    <div class="rich-menu-container" id="capture-area">
        
        <!-- 1. สั่งซื้อวัตถุดิบ (Top Left) -->
        <div class="menu-btn btn-primary-action">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="110" height="110" viewBox="0 0 24 24">
                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </div>
            <h2 class="menu-title">สั่งซื้อวัตถุดิบ</h2>
            <p class="menu-desc">สาขากดสั่งซื้อที่นี่</p>
        </div>

        <!-- 2. ประวัติออเดอร์ (Top Right) -->
        <div class="menu-btn btn-secondary btn-top-right">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24">
                    <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
            </div>
            <h2 class="menu-title">ประวัติออเดอร์</h2>
            <p class="menu-desc">ดูรายการย้อนหลัง</p>
        </div>

        <!-- 3. ติดต่อเรา (Bottom Left) -->
        <div class="menu-btn btn-secondary btn-bottom-left">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24">
                    <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.78 0 1.05-.59 1.05-1.14v-3.49c0-.54-.45-.99-.99-.99z"/>
                </svg>
            </div>
            <h2 class="menu-title">ติดต่อเรา</h2>
            <p class="menu-desc">สอบถามข้อมูล</p>
        </div>

        <!-- 4. ส่งหลักฐานการโอนเงิน (Bottom Right) -->
        <div class="menu-btn btn-secondary btn-bottom-right">
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24">
                    <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H5V5h2v2h10V5h2v8h2V5c0-1.1-.9-2-2-2zm-7 1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm8.5 11.5-1.41 1.41L20.17 18H15v2h5.17l-1.08 1.09 1.41 1.41L24 19l-3.5-3.5zM7 11h10v2H7zm0 4h6v2H7z"/>
                </svg>
            </div>
            <h2 class="menu-title">ส่งหลักฐานการโอนเงิน</h2>
            <p class="menu-desc">แนบสลิปเพื่อยืนยันการชำระเงิน</p>
        </div>

        <!-- ตรงกลาง (โลโก้ชา) -->
        <div class="center-badge">🍵</div>

    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('export') === '1') { document.body.classList.add('export-mode'); }
        function downloadRichMenu() {
            const btn = document.querySelector('.btn-download');
            btn.textContent = "⏳ กำลังประมวลผล...";
            btn.disabled = true;

            const element = document.getElementById('capture-area');
            
            html2canvas(element, {
                scale: 1, // บังคับสเกล 1:1 ให้ได้รูป 1200x810 เป๊ะๆ
                useCORS: true,
                backgroundColor: "#FFFFFF"
            }).then(canvas => {
                // สร้างลิงก์ดาวน์โหลด
                const link = document.createElement('a');
                link.download = 'rich_menu_chaphranakhon_new.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                btn.textContent = "✅ โหลดรูปภาพสำเร็จ!";
                setTimeout(() => {
                    btn.textContent = "📥 บันทึกรูปภาพ (Save as PNG)";
                    btn.disabled = false;
                }, 3000);
            }).catch(err => {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการสร้างรูปภาพ');
                btn.textContent = "📥 บันทึกรูปภาพ (Save as PNG)";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
