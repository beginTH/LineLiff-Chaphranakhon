<!doctype html>
<html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ชาพระนคร - ส่งหลักฐานการโอนเงิน</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="menu-pages.css"></head>
<body><main class="page"><header class="header"><button class="back" type="button" onclick="closeOrBack()">‹ กลับ</button><div class="brand">🍵 ชาพระนคร</div><h1>ส่งหลักฐานการโอนเงิน</h1><p>แนบสลิปเพื่อให้ทีมงานตรวจสอบ</p></header><section class="content"><div id="message" class="message"></div><form id="payment-form" class="card"><div class="field"><label for="order-id">เลือกออเดอร์</label><select id="order-id" required><option value="">กำลังโหลดรายการ...</option></select></div><div class="field"><label for="transfer-at">วันที่และเวลาโอน</label><input id="transfer-at" type="datetime-local" required></div><div class="field"><label for="payment-amount">ยอดเงินที่โอน</label><input id="payment-amount" type="number" inputmode="decimal" min="0" step="0.01" required></div><div class="field"><label for="proof-file">รูปสลิป</label><input id="proof-file" type="file" accept="image/jpeg,image/png,image/webp" required><p class="file-help">รองรับ JPG, PNG, WEBP ขนาดไม่เกิน 5 MB</p></div><img id="proof-preview" class="preview" alt="ตัวอย่างสลิป"><div class="field"><label for="payment-note">หมายเหตุ (ถ้ามี)</label><textarea id="payment-note" placeholder="เช่น โอนจากบัญชีชื่อ..."></textarea></div><button id="submit-payment" class="btn" type="submit">ส่งหลักฐานการโอนเงิน</button></form></section></main><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script><script src="payment-proof.js?v=20260722-payment-fix"></script></body></html>
